<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potree Viewer</title>

    <link rel="stylesheet" type="text/css" href="./build/potree/potree.css">
    <link rel="stylesheet" type="text/css" href="./libs/jquery-ui/jquery-ui.min.css">
    <link rel="stylesheet" type="text/css" href="./libs/openlayers3/ol.css">
    <link rel="stylesheet" type="text/css" href="./libs/spectrum/spectrum.css">
    <link rel="stylesheet" type="text/css" href="./libs/jstree/themes/mixed/style.css">
</head>

<body style="margin: 0; padding: 0; overflow: hidden; background-color: #000000;">
    <script src="./libs/jquery/jquery-3.1.1.min.js"></script>
    <script src="./libs/spectrum/spectrum.js"></script>
    <script src="./libs/jquery-ui/jquery-ui.min.js"></script>
    <script src="./libs/three.js/build/three.min.js"></script>
    <script src="./libs/other/BinaryHeap.js"></script>
    <script src="./libs/tween/tween.min.js"></script>
    <script src="./libs/d3/d3.js"></script>
    <script src="./libs/proj4/proj4.js"></script>
    <script src="./libs/openlayers3/ol.js"></script>
    <script src="./libs/i18next/i18next.js"></script>
    <script src="./libs/jstree/jstree.js"></script>
    
    <script src="./build/potree/potree.js"></script>
    <script src="./libs/plasio/js/laslaz.js"></script>

    <div class="potree_container" style="position: absolute; width: 100%; height: 100%; left: 0px; top: 0px; ">
        <div id="potree_render_area"></div>
        <div id="potree_sidebar_container"></div>
    </div>

    <script>
    const urlParams = new URLSearchParams(window.location.search);
    const cloudUrl = urlParams.get('cloudUrl');

    let globalCarMesh = null;
    let isFirstCameraUpdate = true; // เพิ่มตัวแปรสำหรับเช็คการโหลดครั้งแรก

    if (!cloudUrl) {
        document.getElementById('potree_render_area').innerHTML = '<h2 style="color:white; text-align:center; margin-top:20%;">No Point Cloud URL Provided</h2>';
    } else {
        window.viewer = new Potree.Viewer(document.getElementById("potree_render_area"));
        
        viewer.setEDLEnabled(false);
        viewer.setFOV(60);
        viewer.setPointBudget(2_000_000);
        viewer.setBackground("black");

        const renderArea = document.getElementById("potree_render_area");
        renderArea.addEventListener("webglcontextlost", function(event) {
            event.preventDefault();
            console.error("WebGL Context Lost!");
            renderArea.innerHTML = `
                <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:white; background:#111;">
                    <h3 style="color:#ef4444;">หน่วยความจำการ์ดจอเต็ม (WebGL Context Lost)</h3>
                    <p>ระบบใช้ทรัพยากรกราฟิกหนักเกินไป กำลังโหลด 3D Viewer ใหม่ใน 3 วินาที...</p>
                </div>
            `;
            setTimeout(() => { window.location.reload(); }, 3000);
        }, false);

        viewer.loadGUI(() => {
            viewer.setLanguage('en');
            $("#menu_tools").next().show();
            viewer.toggleSidebar();
        });

        Potree.loadPointCloud(cloudUrl, "Point Cloud", e => {
            let scene = viewer.scene;
            let pointcloud = e.pointcloud;
            
            let material = pointcloud.material;
            material.size = 1;
            material.pointSizeType = Potree.PointSizeType.ADAPTIVE;
            scene.addPointCloud(pointcloud);

            // ====================
            // Car model
            // ====================
            globalCarMesh = new THREE.Group();

            // (Body)
            const bodyGeom = new THREE.BoxGeometry(2, 4, 1);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x3b82f6 }); // สีฟ้า
            const body = new THREE.Mesh(bodyGeom, bodyMat);
            body.position.z = 0.5; // ยกขึ้นเหนือพื้นเล็กน้อย
            globalCarMesh.add(body);

            // (Roof)
            const roofGeom = new THREE.BoxGeometry(1.8, 2, 0.8);
            const roofMat = new THREE.MeshStandardMaterial({ color: 0x60a5fa }); // สีฟ้าอ่อน
            const roof = new THREE.Mesh(roofGeom, roofMat);
            roof.position.set(0, -0.5, 1.4); 
            globalCarMesh.add(roof);

            viewer.scene.scene.add(globalCarMesh);

        });
    }

    window.addEventListener('message', (event) => {
        if (event.data && event.data.type === 'UPDATE_CAMERA') {
            const coords = event.data.coords;
            const camX = coords.x || 0;
            const camY = coords.y || 0;
            const camZ = coords.z || 0;
            const heading = coords.heading || 0;
            const pitch = coords.pitch || 0;
            const roll = coords.roll || 0;

            if (globalCarMesh) {
                globalCarMesh.position.set(camX, camY, camZ);
                globalCarMesh.rotation.z = -THREE.MathUtils.degToRad(heading); 
                globalCarMesh.rotation.x = -THREE.MathUtils.degToRad(pitch); 
                globalCarMesh.rotation.y = -THREE.MathUtils.degToRad(roll); 
            }

            if (window.viewer && isFirstCameraUpdate) {
                window.viewer.scene.view.position.set(camX + 15, camY - 15, camZ + 10); 
                window.viewer.scene.view.lookAt(new THREE.Vector3(camX, camY, camZ));

                isFirstCameraUpdate = false; 
            }
        }
    });
    </script>
</body>
</html>
